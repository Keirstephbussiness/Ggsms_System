<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGSMS Ship License Calendar</title>

    <!-- FullCalendar (using latest 6.1.x stable - Jan 2026) -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Your custom styles - relative path from Admin/html/ to Admin/css/ -->
    <link rel="stylesheet" href="../css/admin-calendar.css">
    <link rel="stylesheet" href="../css/admin-navigation.css">



    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

</head>
<body>
    <div class="app-container">

        <!-- Custom Title Bar -->
        <div class="titlebar">
            <div class="titlebar-drag-region">
                <div class="titlebar-content">
                    
                    <span class="app-title">GGSMS Calendar</span>
                </div>
            </div>
            <div class="window-controls">
                <button class="window-control-btn minimize" id="minimizeBtn">
                    <svg width="12" height="12" viewBox="0 0 12 12">
                        <path d="M0 6h12" stroke="currentColor" stroke-width="1"/>
                    </svg>
                </button>
                <button class="window-control-btn maximize" id="maximizeBtn">
                    <svg width="12" height="12" viewBox="0 0 12 12">
                        <rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="1" fill="none"/>
                    </svg>
                </button>
                <button class="window-control-btn close" id="closeBtn">
                    <svg width="12" height="12" viewBox="0 0 12 12">
                        <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1"/>
                    </svg>
                </button>
            </div>
        </div>

        
    <!-- App row: sidebar + content -->
    <div id="appRow">

        <!-- ══ SIDEBAR ══ -->
        <aside class="sidebar collapsed" id="sidebar">

            <button class="logo-area" id="sidebarToggle" aria-label="Toggle navigation">
                <div class="logo-icon-wrap">
                    <img
                        class="logo-img"
                        src="../../images/shipicon.png"
                        alt="GGSMS logo"
                        onerror="this.outerHTML='<span class=&quot;logo-fallback&quot;>⚓</span>'"
                    />
                </div>
                <div class="logo-text">
                    <div class="logo-name">GGSMS <em>SYSTEM</em></div>
                    <div class="logo-sub">Admin Portal</div>
                </div>
            </button>

            <div class="nav-section">
                <div class="nav-section-label">Navigation</div>
            </div>

            <nav class="nav-items">

                <a href="admin-company.html" class="nav-item">
                    <div class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="1.8"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 21H21"/>
                            <path d="M5 21V10C5 8.9 5.9 8 7 8H17C18.1 8 19 8.9 19 10V21"/>
                            <path d="M9 21V16C9 15.4 9.4 15 10 15H14C14.6 15 15 15.4 15 16V21"/>
                            <path d="M12 8V5M10 5H14"/>
                        </svg>
                    </div>
                    <span class="nav-label">Companies</span>
                    <span class="tooltip">Companies</span>
                </a>

                <a href="admin-seafarer.html" class="nav-item ">
                    <div class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="1.8"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                    </div>
                    <span class="nav-label">Seafarers</span>
                    <span class="tooltip">Seafarers</span>
                </a>

                <a href="admin-calendar.html" class="nav-item active">
                    <div class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"
                             stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                            <rect x="3" y="5" width="14" height="12" rx="2"/>
                            <path d="M3 9h14M7 3v3M13 3v3"/>
                        </svg>
                    </div>
                    <span class="nav-label">Calendar</span>
                    <span class="tooltip">Calendar</span>
                </a>

                <a href="admin-weather.html" class="nav-item">
                    <div class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"
                             stroke="currentColor" stroke-width="1.8">
                            <path d="M5 14a4 4 0 117.584-1.723A3 3 0 1115 17H5.5A2.5 2.5 0 015 14z"
                                  stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="nav-label">Weather</span>
                    <span class="tooltip">Weather</span>
                </a>

            </nav>

            <div class="sidebar-footer">
                <a href="#" class="logout-btn">
                    <div class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </div>
                    <span class="logout-label">Logout</span>
                    <span class="tooltip">Logout</span>
                </a>
            </div>

        </aside>
        <!-- ══ /SIDEBAR ══ -->

    

        <!-- Main Content -->
        <div class="main-content">
            <div class="content-wrapper">
                <div class="header-section">
                    <div class="header-text">
                        <h1 class="main-heading">GGSMS Calendar</h1>
                    </div>
                    <button class="today-btn" id="todayBtn">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <rect x="3" y="4" width="14" height="14" rx="2" stroke="currentColor" stroke-width="2"/>
                            <path d="M3 8H17M7 2V6M13 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="10" cy="12" r="2" fill="currentColor"/>
                        </svg>
                        <span>Today</span>
                    </button>
                </div>

                <div class="calendar-container">
                    <div id="calendar"></div>
                </div>
            </div>
        </div>

        <!-- Event Details Modal -->
        <div class="modal-overlay" id="eventModalOverlay">
            <div class="modal-container event-modal">
                <div class="modal-header">
                    <h2 class="modal-title" id="eventModalTitle">Certificate Details</h2>
                    <button class="modal-close" id="eventModalCloseBtn">
                        <svg width="20" height="20" viewBox="0 0 20 20">
                            <path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="event-details" id="eventDetails">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@6.1.15/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>




  



    <!-- Electron window controls -->
    <script>
        const { ipcRenderer } = require('electron');

        document.getElementById('minimizeBtn')?.addEventListener('click', () => {
            ipcRenderer.send('window-minimize');
        });

        document.getElementById('maximizeBtn')?.addEventListener('click', () => {
            ipcRenderer.send('window-maximize');
        });

        document.getElementById('closeBtn')?.addEventListener('click', () => {
            ipcRenderer.send('window-close');
        });
    </script>

    <!-- Your calendar logic - relative path from html/ to js/ -->
    <script src="../js/admin-calendar.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/logout.js"></script>
    <script src="../js/no-interenet.js"></script>
</body>
</html>
