name: Build Electron App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & Publish Windows
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload latest.yml to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/latest.yml
            dist/*.exe
            dist/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    needs: build-windows        # ← wait for windows first to avoid race condition
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install dmg-license
        run: npm install dmg-license

      - name: Delete existing release assets to avoid 422 conflict
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            console.log('Tag:', tag);

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag,
              });
            } catch (e) {
              console.log('No existing release found, skipping asset deletion.');
              return;
            }

            const assets = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
            });

            const macPatterns = ['.dmg', '.zip', 'latest-mac.yml', '.blockmap'];

            for (const asset of assets.data) {
              if (macPatterns.some(p => asset.name.includes(p))) {
                console.log('Deleting asset:', asset.name);
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            }

      - name: Build & Publish Mac
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload latest-mac.yml to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/latest-mac.yml
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}