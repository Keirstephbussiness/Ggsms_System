name: Build Electron App

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install
      - run: npm run dist

      - uses: softprops/action-gh-release@v1
        with:
          files: dist/*

  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install
      - run: npm run dist

      - uses: softprops/action-gh-release@v1
        with:
          files: dist/*