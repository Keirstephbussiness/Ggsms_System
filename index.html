<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGSMS System - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <!-- Background Image -->
    <div class="background-image" style="background-image: url('images/background-image.jpg');"></div>
    <div class="background-overlay"></div>

    <div class="app-container">
        <!-- Custom Title Bar -->
        <div class="titlebar">
            <div class="titlebar-drag-region">
                <div class="titlebar-content">
                    <div class="app-icon">
                       <img src="images/shipicon.png" alt="Ship Icon">
                    </div>
                    <span class="app-title">GGSMS Ship License Registry</span>
                </div>
            </div>
            <div class="window-controls">
                <button class="window-control-btn minimize" id="minimizeBtn">
                    <svg width="12" height="12" viewBox="0 0 12 12">
                        <path d="M0 6h12" stroke="currentColor" stroke-width="1"/>
                    </svg>
                </button>
                <button class="window-control-btn maximize" id="maximizeBtn">
                    <svg width="12" height="12" viewBox="0 0 12 12">
                        <rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="1" fill="none"/>
                    </svg>
                </button>
                <button class="window-control-btn close" id="closeBtn">
                    <svg width="12" height="12" viewBox="0 0 12 12">
                        <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="auth-content">
            <div class="auth-box">

                <!-- Left Side - Forms -->
                <div class="forms-section">
                    <div class="forms-header">
                        <h1 class="system-title">GGSMS SYSTEM</h1>
                        <p class="system-subtitle">Welcome Back</p>
                    </div>

                    <!-- View Switcher -->
                    <div class="view-switcher">
                        <button class="switch-btn active" data-view="login">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                                <polyline points="10 17 15 12 10 7"></polyline>
                                <line x1="15" y1="12" x2="3" y2="12"></line>
                            </svg>
                            Login
                        </button>
                        <button class="switch-btn" data-view="register">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="8.5" cy="7" r="4"></circle>
                                <line x1="20" y1="8" x2="20" y2="14"></line>
                                <line x1="23" y1="11" x2="17" y2="11"></line>
                            </svg>
                            Register
                        </button>
                    </div>

                    <!-- ── LOGIN VIEW ── -->
                    <div class="auth-view active" id="loginView">

                        <!-- Type Selector -->
                        <div class="type-selector-wrapper">
                            <p class="type-selector-label">Select Login Type:</p>
                            <div class="type-selector">
                                <button class="type-btn active" data-type="employee">
                                    <div class="type-icon">
                                        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                                            <circle cx="20" cy="14" r="6" stroke="currentColor" stroke-width="2.5"/>
                                            <path d="M8 33C8 26 12 22 20 22C28 22 32 26 32 33" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                                        </svg>
                                    </div>
                                    <span class="type-label">Employee</span>
                                    <span class="type-desc">Login with email</span>
                                </button>
                                <button class="type-btn" data-type="admin">
                                    <div class="type-icon">
                                        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                                            <path d="M20 4L8 10V18C8 26 13 33 20 36C27 33 32 26 32 18V10L20 4Z" stroke="currentColor" stroke-width="2.5"/>
                                            <path d="M15 20L18 23L25 15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </div>
                                    <span class="type-label">Admin</span>
                                    <span class="type-desc">Login with username</span>
                                </button>
                            </div>
                        </div>

                        <div class="forms-container">
                            <!-- Employee Login Form -->
                            <form class="auth-form active" id="employeeLoginForm">
                                <div class="input-group">
                                    <label class="input-label">Email Address</label>
                                    <div class="input-wrapper">
                                        <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                            <path d="M3 6L10 11L17 6M3 6V14C3 14.5 3.5 15 4 15H16C16.5 15 17 14.5 17 14V6M3 6C3 5.5 3.5 5 4 5H16C16.5 5 17 5.5 17 6" stroke="currentColor" stroke-width="2"/>
                                        </svg>
                                        <input type="email" id="employeeEmail" class="form-input" placeholder="employee@example.com" required>
                                    </div>
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Password</label>
                                    <div class="input-wrapper">
                                        <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                            <rect x="5" y="9" width="10" height="8" rx="1" stroke="currentColor" stroke-width="2"/>
                                            <path d="M7 9V6C7 4.3 8.3 3 10 3C11.7 3 13 4.3 13 6V9" stroke="currentColor" stroke-width="2"/>
                                        </svg>
                                        <input type="password" id="employeePassword" class="form-input" placeholder="Enter password" required>
                                        <button type="button" class="toggle-password" data-target="employeePassword">
                                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                                <path d="M1 10C1 10 4 4 10 4C16 4 19 10 19 10C19 10 16 16 10 16C4 16 1 10 1 10Z" stroke="currentColor" stroke-width="2"/>
                                                <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="2"/>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <button type="submit" class="submit-btn">
                                    <span class="btn-text">Login as Employee</span>
                                    <svg class="btn-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                        <path d="M5 10H15M15 10L11 6M15 10L11 14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                    <div class="btn-loader"></div>
                                </button>
                            </form>

                            <!-- Admin Login Form -->
                            <form class="auth-form" id="adminLoginForm">
                                <div class="input-group">
                                    <label class="input-label">Username</label>
                                    <div class="input-wrapper">
                                        <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                            <circle cx="10" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                                            <path d="M4 18C4 14 6 12 10 12C14 12 16 14 16 18" stroke="currentColor" stroke-width="2"/>
                                        </svg>
                                        <input type="text" id="adminUsername" class="form-input" placeholder="Enter username" required>
                                    </div>
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Password</label>
                                    <div class="input-wrapper">
                                        <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                            <rect x="5" y="9" width="10" height="8" rx="1" stroke="currentColor" stroke-width="2"/>
                                            <path d="M7 9V6C7 4.3 8.3 3 10 3C11.7 3 13 4.3 13 6V9" stroke="currentColor" stroke-width="2"/>
                                        </svg>
                                        <input type="password" id="adminPassword" class="form-input" placeholder="Enter password" required>
                                        <button type="button" class="toggle-password" data-target="adminPassword">
                                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                                <path d="M1 10C1 10 4 4 10 4C16 4 19 10 19 10C19 10 16 16 10 16C4 16 1 10 1 10Z" stroke="currentColor" stroke-width="2"/>
                                                <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="2"/>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <button type="submit" class="submit-btn admin">
                                    <span class="btn-text">Login as Admin</span>
                                    <svg class="btn-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                        <path d="M5 10H15M15 10L11 6M15 10L11 14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                    <div class="btn-loader"></div>
                                </button>
                            </form>

                            <!-- Alert -->
                            <div class="alert-container" id="alertContainer">
                                <div class="alert-content">
                                    <svg class="alert-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                        <path d="M10 1L1 18H19L10 1Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                        <path d="M10 7V11M10 14H10.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                    </svg>
                                    <p class="alert-message" id="alertMessage"></p>
                                </div>
                                <button class="alert-close" id="alertClose">
                                    <svg width="14" height="14" viewBox="0 0 14 14">
                                        <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- ── REGISTER VIEW ── -->
                    <div class="auth-view" id="registerView">
                        <div class="register-header">
                            <h3 class="register-title">Create Employee Account</h3>
                            <p class="register-subtitle">Fill in the details below to register</p>
                        </div>

                        <div class="forms-container">
                            <form class="auth-form active" id="registerForm">
                                <div class="input-group">
                                    <label class="input-label">Full Name</label>
                                    <div class="input-wrapper">
                                        <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                            <circle cx="10" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                                            <path d="M4 18C4 14 6 12 10 12C14 12 16 14 16 18" stroke="currentColor" stroke-width="2"/>
                                        </svg>
                                        <input type="text" id="registerName" class="form-input" placeholder="Enter full name" required>
                                    </div>
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Email Address</label>
                                    <div class="input-wrapper">
                                        <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                            <path d="M3 6L10 11L17 6M3 6V14C3 14.5 3.5 15 4 15H16C16.5 15 17 14.5 17 14V6M3 6C3 5.5 3.5 5 4 5H16C16.5 5 17 5.5 17 6" stroke="currentColor" stroke-width="2"/>
                                        </svg>
                                        <input type="email" id="registerEmail" class="form-input" placeholder="employee@example.com" required>
                                    </div>
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Password</label>
                                    <div class="input-wrapper">
                                        <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                            <rect x="5" y="9" width="10" height="8" rx="1" stroke="currentColor" stroke-width="2"/>
                                            <path d="M7 9V6C7 4.3 8.3 3 10 3C11.7 3 13 4.3 13 6V9" stroke="currentColor" stroke-width="2"/>
                                        </svg>
                                        <input type="password" id="registerPassword" class="form-input" placeholder="Create password (min 6 characters)" required>
                                        <button type="button" class="toggle-password" data-target="registerPassword">
                                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                                <path d="M1 10C1 10 4 4 10 4C16 4 19 10 19 10C19 10 16 16 10 16C4 16 1 10 1 10Z" stroke="currentColor" stroke-width="2"/>
                                                <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="2"/>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <div class="input-group">
                                    <label class="input-label">Confirm Password</label>
                                    <div class="input-wrapper">
                                        <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                            <path d="M8 10L10 12L14 8M5 4H15C16.1 4 17 4.9 17 6V14C17 15.1 16.1 16 15 16H5C3.9 16 3 15.1 3 14V6C3 4.9 3.9 4 5 4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                        </svg>
                                        <input type="password" id="registerConfirmPassword" class="form-input" placeholder="Re-enter password" required>
                                        <button type="button" class="toggle-password" data-target="registerConfirmPassword">
                                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                                <path d="M1 10C1 10 4 4 10 4C16 4 19 10 19 10C19 10 16 16 10 16C4 16 1 10 1 10Z" stroke="currentColor" stroke-width="2"/>
                                                <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="2"/>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <button type="submit" class="submit-btn success">
                                    <span class="btn-text">Create Account</span>
                                    <svg class="btn-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none">
                                        <path d="M16 7C16 9.20914 14.2091 11 12 11C9.79086 11 8 9.20914 8 7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M12 14C8.13401 14 5 17.134 5 21H19C19 17.134 15.866 14 12 14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M21 10H17M19 8V12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                    <div class="btn-loader"></div>
                                </button>
                            </form>

                            <!-- Alert Register -->
                            <div class="alert-container" id="alertContainerRegister">
                                <div class="alert-content">
                                    <svg class="alert-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                        <path d="M10 1L1 18H19L10 1Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                        <path d="M10 7V11M10 14H10.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                    </svg>
                                    <p class="alert-message" id="alertMessageRegister"></p>
                                </div>
                                <button class="alert-close" id="alertCloseRegister">
                                    <svg width="14" height="14" viewBox="0 0 14 14">
                                        <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Side - Branding -->
                <div class="logo-section">
                    <div class="logo-bg-pattern"></div>
                    <div class="logo-content">
                        <div class="logo-container">
                            <div class="logo-glow"></div>
                            <img src="images/shipicon.png" alt="Company Logo" id="companyLogo" class="company-logo">
                        </div>
                        <h2 class="branding-title">Ship License<br>Management System</h2>
                        <p class="branding-tagline">Streamline your maritime operations</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- ONLY auth.js — no Supabase script -->
    <script src="no-internet.js"></script>
    <script src="auth.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
